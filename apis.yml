aid: cumulocity
url: https://raw.githubusercontent.com/api-evangelist/cumulocity/refs/heads/main/apis.yml
apis:
  - aid: cumulocity:cumulocity-inventory-api
    name: Cumulocity Inventory API
    tags:
      - IoT
      - Inventory
      - Managed Objects
      - Devices
      - Assets
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/inventory
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: https://cumulocity.com/docs/concepts/domain-model/
        type: Documentation
      - url: openapi/cumulocity-inventory-api-openapi.yml
        type: OpenAPI
      - url: json-schema/cumulocity-managed-object-schema.json
        type: JSONSchema
      - url: json-ld/cumulocity-context.jsonld
        type: JSONLD
    description: >-
      Manage Cumulocity managed objects which represent any IoT-relevant asset including devices, groups, assets, and
      digital twins. Supports hierarchical parent/child relationships, fragment-based extensibility, full-text search,
      and bulk operations on the /inventory/managedObjects collection.
  - aid: cumulocity:cumulocity-identity-api
    name: Cumulocity Identity API
    tags:
      - IoT
      - Identity
      - External IDs
      - Devices
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/identity
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: openapi/cumulocity-identity-api-openapi.yml
        type: OpenAPI
    description: >-
      Link external identifiers (IMEI, serial numbers, MAC addresses, ICCID, c8y_Serial, etc.) to Cumulocity managed
      object IDs. The Identity API is the primary lookup table used by device bootstrap, MQTT auto-registration, and any
      integration that needs to translate provider-specific IDs to Cumulocity IDs.
  - aid: cumulocity:cumulocity-measurement-api
    name: Cumulocity Measurement API
    tags:
      - IoT
      - Measurements
      - Time Series
      - Telemetry
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/measurement
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: openapi/cumulocity-measurement-api-openapi.yml
        type: OpenAPI
      - url: json-schema/cumulocity-measurement-schema.json
        type: JSONSchema
    description: >-
      Ingest, query, and delete device measurements (telemetry data points) including temperature, voltage, location,
      and arbitrary custom fragments with units. Supports time-range queries, source filters, type filters, series
      aggregations (hourly/daily), and bulk creation via the /measurement/measurements collection.
  - aid: cumulocity:cumulocity-event-api
    name: Cumulocity Event API
    tags:
      - IoT
      - Events
      - Telemetry
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/event
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: openapi/cumulocity-event-api-openapi.yml
        type: OpenAPI
      - url: json-schema/cumulocity-event-schema.json
        type: JSONSchema
    description: >-
      Create, query, and delete events emitted by devices and applications. Events capture discrete happenings (door
      opened, geofence crossed, image captured) with a type, time, text, source device, and arbitrary custom fragments.
      Binary attachments are supported via the events/{id}/binaries sub-resource.
  - aid: cumulocity:cumulocity-alarm-api
    name: Cumulocity Alarm API
    tags:
      - IoT
      - Alarms
      - Monitoring
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/alarm
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: openapi/cumulocity-alarm-api-openapi.yml
        type: OpenAPI
      - url: json-schema/cumulocity-alarm-schema.json
        type: JSONSchema
    description: >-
      Raise, query, acknowledge, clear, and bulk-update alarms with four severity levels (CRITICAL, MAJOR, MINOR,
      WARNING) and four statuses (ACTIVE, ACKNOWLEDGED, CLEARED). Cumulocity auto-deduplicates alarms by source + type
      so repeated raises increment the count rather than creating duplicates.
  - aid: cumulocity:cumulocity-device-control-api
    name: Cumulocity Device Control API
    tags:
      - IoT
      - Operations
      - Device Control
      - Bulk Operations
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/devicecontrol
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: openapi/cumulocity-device-control-api-openapi.yml
        type: OpenAPI
    description: >-
      Send and track operations (commands) to devices including firmware updates, configuration changes, software
      installation, shell commands, and restart requests. Operations move through PENDING, EXECUTING, SUCCESSFUL, FAILED
      status. Bulk operations let you target an entire device group with a single request.
  - aid: cumulocity:cumulocity-device-bootstrap-api
    name: Cumulocity Device Bootstrap API
    tags:
      - IoT
      - Device Onboarding
      - Bootstrap
      - Registration
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/devicecontrol/deviceCredentials
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: https://cumulocity.com/docs/device-integration/device-integration-introduction/
        type: Documentation
      - url: openapi/cumulocity-device-bootstrap-api-openapi.yml
        type: OpenAPI
    description: >-
      Zero-touch device onboarding flow. A factory-bootstrapped device authenticates with a shared bootstrap user, polls
      /devicecontrol/deviceCredentials with its external ID, and receives back tenant-scoped credentials once an admin
      accepts the registration request in the Device Management UI.
  - aid: cumulocity:cumulocity-tenant-api
    name: Cumulocity Tenant API
    tags:
      - IoT
      - Multi-Tenancy
      - Administration
      - Tenant Options
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/tenant
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: openapi/cumulocity-tenant-api-openapi.yml
        type: OpenAPI
    description: >-
      Manage Cumulocity tenants (sub-tenants in enterprise and management hierarchies), tenant options (key-value config
      including encrypted secrets), tenant applications, and tenant usage statistics. Enterprise customers use this API
      to programmatically provision and meter sub-tenants.
  - aid: cumulocity:cumulocity-user-api
    name: Cumulocity User API
    tags:
      - IoT
      - Users
      - Roles
      - Permissions
      - RBAC
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/user
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: openapi/cumulocity-user-api-openapi.yml
        type: OpenAPI
    description: >-
      Manage users, user groups, global roles, inventory roles, and device permissions. Cumulocity uses an RBAC model
      where global roles grant API access and inventory roles grant access to specific managed-object subtrees. Supports
      SSO via SAML/OIDC and SCIM provisioning for enterprise tenants.
  - aid: cumulocity:cumulocity-application-api
    name: Cumulocity Application API
    tags:
      - IoT
      - Applications
      - Microservices
      - Plugins
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/application
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: https://cumulocity.com/docs/microservice-sdk/
        type: Documentation
      - url: openapi/cumulocity-application-api-openapi.yml
        type: OpenAPI
    description: >-
      Register, subscribe, configure, and upload Cumulocity microservices, hosted web applications, and plugins.
      Microservices run inside Cumulocity's managed container runtime and authenticate via a bootstrap user issued by
      this API; web applications are uploaded as ZIPs and served from the tenant subdomain.
  - aid: cumulocity:cumulocity-audit-api
    name: Cumulocity Audit API
    tags:
      - IoT
      - Audit
      - Compliance
      - Governance
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/audit
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: openapi/cumulocity-audit-api-openapi.yml
        type: OpenAPI
    description: >-
      Read the immutable audit trail of changes made within a tenant, including user management actions, operations
      triggered, and managed-object create/update/delete. Critical for compliance, security review, and incident
      forensics.
  - aid: cumulocity:cumulocity-retention-api
    name: Cumulocity Retention Rules API
    tags:
      - IoT
      - Retention
      - Data Lifecycle
      - Compliance
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/retention
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: openapi/cumulocity-retention-api-openapi.yml
        type: OpenAPI
    description: >-
      Define retention rules that automatically delete measurements, events, alarms, audit records, and operations older
      than a configured age. Rules can be scoped by data type, source, and fragment. Default policies apply per-plan;
      Enterprise tenants can override.
  - aid: cumulocity:cumulocity-real-time-notifications-api
    name: Cumulocity Real-Time Notifications API
    tags:
      - IoT
      - Real-Time
      - Bayeux
      - CometD
      - Streaming
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/notification/realtime
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: openapi/cumulocity-real-time-api-openapi.yml
        type: OpenAPI
    description: >-
      Bayeux/CometD-based long-poll subscription protocol for receiving live updates of measurements, events, alarms,
      operations, and inventory changes. Predates Notification 2.0 but remains the default for the Web SDK and legacy
      integrations.
  - aid: cumulocity:cumulocity-notification2-api
    name: Cumulocity Notification 2.0 API
    tags:
      - IoT
      - Notifications
      - Streaming
      - Webhooks
      - Kafka
    humanURL: https://cumulocity.com/api/core/
    baseURL: https://{tenant}.cumulocity.com/notification2
    properties:
      - url: https://cumulocity.com/api/core/
        type: Documentation
      - url: https://cumulocity.com/docs/reference/notifications/
        type: Documentation
      - url: openapi/cumulocity-notification2-api-openapi.yml
        type: OpenAPI
      - url: asyncapi/cumulocity-notification2-asyncapi.yml
        type: AsyncAPI
    description: >-
      High-throughput, persistent, ordered notification streaming designed for production microservices. Subscribers
      declare typed subscriptions (mo, measurements, events, alarms, operations), exchange them for short-lived JWT
      tokens, and consume via WebSocket. Survives subscriber outages by buffering messages on the server.
  - aid: cumulocity:cumulocity-mqtt-api
    name: Cumulocity MQTT and SmartREST API
    tags:
      - IoT
      - MQTT
      - SmartREST
      - Device Integration
      - Telemetry
    humanURL: https://cumulocity.com/docs/device-integration/mqtt/
    baseURL: mqtt://{tenant}.cumulocity.com:1883
    properties:
      - url: https://cumulocity.com/docs/device-integration/mqtt/
        type: Documentation
      - url: https://cumulocity.com/docs/smartrest/smartrest-two/
        type: Documentation
      - url: https://cumulocity.com/docs/smartrest/mqtt-static-templates/
        type: Documentation
      - url: asyncapi/cumulocity-mqtt-asyncapi.yml
        type: AsyncAPI
    description: >-
      Constrained-device MQTT broker fronting the Cumulocity REST API with a CSV-based SmartREST 2.0 payload format that
      saves up to 80% of mobile traffic versus JSON. Supports static templates for common operations (s/us topic family)
      and tenant-defined custom templates. 16 KiB max payload, MQTT 3.1.1 and 5.0 supported, TLS on port 8883.
  - aid: cumulocity:cumulocity-mqtt-service-api
    name: Cumulocity MQTT Service API
    tags:
      - IoT
      - MQTT
      - Streaming
      - Application Integration
    humanURL: https://cumulocity.com/docs/device-integration/mqtt-service/
    baseURL: mqtts://mqtt.{tenant}.cumulocity.com:8883
    properties:
      - url: https://cumulocity.com/docs/device-integration/mqtt-service/
        type: Documentation
      - url: asyncapi/cumulocity-mqtt-service-asyncapi.yml
        type: AsyncAPI
    description: >-
      Standards-compliant, multi-tenant MQTT broker for application-level messaging that does not need Cumulocity's
      domain model. Topics are tenant-scoped, persistent, and bridgeable to the Cumulocity domain model via the Dynamic
      Mapper. Use it as a general-purpose MQTT broker inside your Cumulocity tenant.
  - aid: cumulocity:cumulocity-datahub-api
    name: Cumulocity DataHub API
    tags:
      - IoT
      - Data Lake
      - Analytics
      - SQL
      - Apache Arrow
      - Dremio
    humanURL: https://cumulocity.com/api/datahub/
    baseURL: https://{tenant}.cumulocity.com/service/datahub
    properties:
      - url: https://cumulocity.com/api/datahub/
        type: Documentation
      - url: https://cumulocity.com/docs/datahub/datahub-overview/
        type: Documentation
      - url: openapi/cumulocity-datahub-api-openapi.yml
        type: OpenAPI
    description: >-
      Offload operational IoT data (measurements, events, alarms, inventory) from the Cumulocity MongoDB operational
      store into a Parquet-backed data lake queryable with ANSI SQL via Dremio. Configure offload pipelines, run
      analytics queries, and export results to BI tools (Power BI, Tableau) over JDBC/ODBC/Arrow Flight.
  - aid: cumulocity:cumulocity-dtm-api
    name: Cumulocity Digital Twin Manager API
    tags:
      - IoT
      - Digital Twin
      - Asset Modeling
      - Hierarchies
    humanURL: https://cumulocity.com/api/dtm/
    baseURL: https://{tenant}.cumulocity.com/service/dtm
    properties:
      - url: https://cumulocity.com/api/dtm/
        type: Documentation
      - url: https://cumulocity.com/docs/digital-twin-manager/dtm-overview/
        type: Documentation
      - url: openapi/cumulocity-dtm-api-openapi.yml
        type: OpenAPI
    description: >-
      Model real-world assets and their hierarchies with strongly-typed asset models, custom properties, and computed
      smart-function values. Asset instances reference the underlying Cumulocity managed objects so measurements and
      alarms automatically roll up. Supports inheritance, asset-property widgets, and bulk import via CSV.
  - aid: cumulocity:cumulocity-edge-api
    name: Cumulocity Edge API
    tags:
      - IoT
      - Edge Computing
      - On-Premises
      - Air-Gapped
    humanURL: https://cumulocity.com/api/edge/
    baseURL: https://edge.local
    properties:
      - url: https://cumulocity.com/api/edge/
        type: Documentation
      - url: https://cumulocity.com/docs/edge/edge-overview/
        type: Documentation
      - url: openapi/cumulocity-edge-api-openapi.yml
        type: OpenAPI
    description: >-
      Single-node on-premises deployment of Cumulocity that runs the full platform locally (inventory, events,
      measurements, alarms, streaming analytics, UI) and optionally syncs selected data to a cloud tenant. Targets
      factory floors, vessels, and regulated/air-gapped environments. Released on a 10.x version cadence.
