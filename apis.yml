description: >-
  Cumulocity is an enterprise AIoT (Artificial Intelligence of Things) platform that connects, manages, and analyzes
  industrial assets from cloud to edge. Founded inside Software AG and divested via a 2025 management buyout into an
  independent company (sale announced alongside the IBM acquisition of Software AG's StreamSets and webMethods),
  Cumulocity provides a full-stack platform — REST and MQTT APIs, device management, digital twin modeling, streaming
  analytics powered by Apama, DataHub data-lake offload, Cockpit dashboards, and on-prem Edge deployments — validated at
  100 million devices and 1 million messages/second across industrial equipment, medical devices, manufacturing,
  utilities, energy, transport, retail, and telecommunications.
