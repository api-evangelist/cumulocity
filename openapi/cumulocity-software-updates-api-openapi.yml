openapi: 3.0.3
info:
  title: Cumulocity Alarm Alarms Software Updates API
  version: 10.20.0
  description: 'Raise, query, acknowledge, clear, and bulk-update alarms with four severity levels (CRITICAL, MAJOR,

    MINOR, WARNING) and four statuses (ACTIVE, ACKNOWLEDGED, CLEARED). Cumulocity auto-deduplicates alarms

    by source + type so repeated raises increment the count rather than creating duplicates.

    '
servers:
- url: https://{tenant}.cumulocity.com
  variables:
    tenant:
      default: example
security:
- basicAuth: []
- bearerAuth: []
tags:
- name: Software Updates
paths:
  /service/edge/updates:
    get:
      tags:
      - Software Updates
      summary: List Available Edge Updates
      operationId: listEdgeUpdates
      responses:
        '200':
          description: Available Edge software releases.
    post:
      tags:
      - Software Updates
      summary: Install an Edge Update
      operationId: installEdgeUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: string
      responses:
        '202':
          description: Update started.
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
