naftiko: 1.0.0-alpha2
info:
  label: Cumulocity Tenant API — Options
  description: Manage tenant-scoped key/value configuration (including encrypted secrets) in Cumulocity.
  tags: [Cumulocity, Tenant Options, Configuration]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    C8Y_BASE_URL: C8Y_BASE_URL
    C8Y_USER: C8Y_USER
    C8Y_PASSWORD: C8Y_PASSWORD
capability:
  consumes:
  - type: http
    namespace: tenant-options
    baseUri: '{{env.C8Y_BASE_URL}}'
    resources:
    - name: options
      path: /tenant/options
      operations:
      - name: listtenantoptions
        method: GET
        description: List Tenant Options
      - name: createtenantoption
        method: POST
        description: Create A Tenant Option
        inputParameters:
        - {name: body, in: body, type: object, required: true}
    - name: option
      path: /tenant/options/{category}/{key}
      operations:
      - name: gettenantoption
        method: GET
        description: Retrieve A Tenant Option
        inputParameters:
        - {name: category, in: path, type: string, required: true}
        - {name: key, in: path, type: string, required: true}
      - name: updatetenantoption
        method: PUT
        description: Update A Tenant Option
        inputParameters:
        - {name: category, in: path, type: string, required: true}
        - {name: key, in: path, type: string, required: true}
        - {name: body, in: body, type: object, required: true}
      - name: deletetenantoption
        method: DELETE
        description: Delete A Tenant Option
        inputParameters:
        - {name: category, in: path, type: string, required: true}
        - {name: key, in: path, type: string, required: true}
    authentication:
      type: basic
      username: '{{env.C8Y_USER}}'
      password: '{{env.C8Y_PASSWORD}}'
  exposes:
  - type: mcp
    namespace: tenant-options-mcp
    port: 9090
    transport: http
    tools:
    - name: cumulocity-list-tenant-options
      description: List Cumulocity tenant configuration options.
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: tenant-options.listtenantoptions
      with: {}
    - name: cumulocity-set-tenant-option
      description: Set or update a Cumulocity tenant option.
      hints: {readOnly: false, destructive: false, idempotent: true}
      call: tenant-options.updatetenantoption
      with: {category: tools.category, key: tools.key, body: tools.body}
