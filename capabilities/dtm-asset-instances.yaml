naftiko: 1.0.0-alpha2
info:
  label: Cumulocity Digital Twin Manager — Asset Instances
  description: Create and manage Cumulocity DTM asset instances bound to managed objects.
  tags: [Cumulocity, DTM, Digital Twin, Assets]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    C8Y_BASE_URL: C8Y_BASE_URL
    C8Y_USER: C8Y_USER
    C8Y_PASSWORD: C8Y_PASSWORD
capability:
  consumes:
  - type: http
    namespace: dtm-asset-instances
    baseUri: '{{env.C8Y_BASE_URL}}'
    resources:
    - name: asset-instances
      path: /service/dtm/asset-instances
      operations:
      - name: listassetinstances
        method: GET
        description: List Asset Instances
        inputParameters:
        - {name: model, in: query, type: string}
      - name: createassetinstance
        method: POST
        description: Create An Asset Instance
        inputParameters:
        - {name: body, in: body, type: object, required: true}
    - name: asset-instance
      path: /service/dtm/asset-instances/{id}
      operations:
      - name: getassetinstance
        method: GET
        description: Retrieve An Asset Instance
        inputParameters:
        - {name: id, in: path, type: string, required: true}
      - name: updateassetinstance
        method: PUT
        description: Update An Asset Instance
        inputParameters:
        - {name: id, in: path, type: string, required: true}
        - {name: body, in: body, type: object, required: true}
      - name: deleteassetinstance
        method: DELETE
        description: Delete An Asset Instance
        inputParameters:
        - {name: id, in: path, type: string, required: true}
    authentication:
      type: basic
      username: '{{env.C8Y_USER}}'
      password: '{{env.C8Y_PASSWORD}}'
  exposes:
  - type: mcp
    namespace: dtm-asset-instances-mcp
    port: 9090
    transport: http
    tools:
    - name: cumulocity-list-asset-instances
      description: List Cumulocity DTM asset instances.
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: dtm-asset-instances.listassetinstances
      with: {model: tools.model}
    - name: cumulocity-create-asset-instance
      description: Create a Cumulocity DTM asset instance.
      hints: {readOnly: false, destructive: false, idempotent: false}
      call: dtm-asset-instances.createassetinstance
      with: {body: tools.body}
