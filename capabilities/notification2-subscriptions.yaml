naftiko: 1.0.0-alpha2
info:
  label: Cumulocity Notification 2.0 — Subscriptions
  description: Declare and manage typed, persistent Notification 2.0 subscriptions across managedobjects, measurements, events, alarms, and operations.
  tags: [Cumulocity, Notification 2.0, Subscriptions]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    C8Y_BASE_URL: C8Y_BASE_URL
    C8Y_USER: C8Y_USER
    C8Y_PASSWORD: C8Y_PASSWORD
capability:
  consumes:
  - type: http
    namespace: notification2-subscriptions
    baseUri: '{{env.C8Y_BASE_URL}}'
    resources:
    - name: subscriptions
      path: /notification2/subscriptions
      operations:
      - name: listsubscriptions
        method: GET
        description: List Notification 2.0 Subscriptions
        inputParameters:
        - {name: source, in: query, type: string}
        - {name: context, in: query, type: string}
        - {name: subscription, in: query, type: string}
      - name: createsubscription
        method: POST
        description: Create A Subscription
        inputParameters:
        - {name: body, in: body, type: object, required: true}
    - name: subscription
      path: /notification2/subscriptions/{id}
      operations:
      - name: deletesubscription
        method: DELETE
        description: Delete A Subscription
        inputParameters:
        - {name: id, in: path, type: string, required: true}
    authentication:
      type: basic
      username: '{{env.C8Y_USER}}'
      password: '{{env.C8Y_PASSWORD}}'
  exposes:
  - type: mcp
    namespace: notification2-subscriptions-mcp
    port: 9090
    transport: http
    tools:
    - name: cumulocity-list-notification2-subscriptions
      description: List Cumulocity Notification 2.0 subscriptions.
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: notification2-subscriptions.listsubscriptions
      with: {source: tools.source, context: tools.context, subscription: tools.subscription}
    - name: cumulocity-create-notification2-subscription
      description: Create a Notification 2.0 subscription scoped to a tenant or managed object.
      hints: {readOnly: false, destructive: false, idempotent: false}
      call: notification2-subscriptions.createsubscription
      with: {body: tools.body}
    - name: cumulocity-delete-notification2-subscription
      description: Delete a Notification 2.0 subscription.
      hints: {readOnly: false, destructive: true, idempotent: true}
      call: notification2-subscriptions.deletesubscription
      with: {id: tools.id}
