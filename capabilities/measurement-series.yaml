naftiko: 1.0.0-alpha2
info:
  label: Cumulocity Measurement API — Series Aggregations
  description: Retrieve time-bucketed series aggregations (MINUTELY, HOURLY, DAILY) of Cumulocity measurements.
  tags: [Cumulocity, Measurements, Series, Aggregation]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    C8Y_BASE_URL: C8Y_BASE_URL
    C8Y_USER: C8Y_USER
    C8Y_PASSWORD: C8Y_PASSWORD
capability:
  consumes:
  - type: http
    namespace: measurement-series
    baseUri: '{{env.C8Y_BASE_URL}}'
    resources:
    - name: series
      path: /measurement/measurements/series
      operations:
      - name: getseries
        method: GET
        description: Retrieve Series Aggregations
        inputParameters:
        - {name: source, in: query, type: string, required: true}
        - {name: series, in: query, type: string, required: true}
        - {name: aggregationType, in: query, type: string}
        - {name: dateFrom, in: query, type: string, required: true}
        - {name: dateTo, in: query, type: string, required: true}
    authentication:
      type: basic
      username: '{{env.C8Y_USER}}'
      password: '{{env.C8Y_PASSWORD}}'
  exposes:
  - type: mcp
    namespace: measurement-series-mcp
    port: 9090
    transport: http
    tools:
    - name: cumulocity-get-series
      description: Aggregate Cumulocity measurement series into MINUTELY, HOURLY, or DAILY buckets.
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: measurement-series.getseries
      with: {source: tools.source, series: tools.series, aggregationType: tools.aggregationType, dateFrom: tools.dateFrom, dateTo: tools.dateTo}
