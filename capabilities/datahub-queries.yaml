naftiko: 1.0.0-alpha2
info:
  label: Cumulocity DataHub — Queries
  description: Run ad-hoc ANSI SQL queries against the Cumulocity DataHub Parquet data lake via Dremio.
  tags: [Cumulocity, DataHub, SQL, Analytics]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    C8Y_BASE_URL: C8Y_BASE_URL
    C8Y_USER: C8Y_USER
    C8Y_PASSWORD: C8Y_PASSWORD
capability:
  consumes:
  - type: http
    namespace: datahub-queries
    baseUri: '{{env.C8Y_BASE_URL}}'
    resources:
    - name: query
      path: /service/datahub/query
      operations:
      - name: runquery
        method: POST
        description: Run An Ad-Hoc SQL Query
        inputParameters:
        - {name: body, in: body, type: object, required: true}
    authentication:
      type: basic
      username: '{{env.C8Y_USER}}'
      password: '{{env.C8Y_PASSWORD}}'
  exposes:
  - type: mcp
    namespace: datahub-queries-mcp
    port: 9090
    transport: http
    tools:
    - name: cumulocity-datahub-sql
      description: Execute an ANSI SQL query against the Cumulocity DataHub data lake.
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: datahub-queries.runquery
      with: {body: tools.body}
